<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - São Luiz</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 0; }
        
        /* Tela de Login do Admin */
        #loginAdmin { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #343a40; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;}
        .login-box button:hover { background-color: #0056b3; }
        
        /* Painel Principal (Escondido inicialmente) */
        #painelAdmin { display: none; max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        
        /* Abas de Navegação */
        .abas { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
        .aba { padding: 10px 20px; cursor: pointer; font-weight: bold; color: #555; }
        .aba:hover { background-color: #f8f9fa; }
        .aba.ativa { border-bottom: 3px solid #007bff; color: #007bff; margin-bottom: -2px; }
        
        /* Conteúdo das Abas */
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }
        
        /* Formulários e Tabelas */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-sucesso { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;}
        .btn-sucesso:hover { background-color: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; color: #333;}
    </style>
</head>
<body>

    <div id="loginAdmin">
        <div class="login-box">
            <h2 style="margin-top:0;">Acesso Restrito</h2>
            <p style="color: #666; font-size: 14px;">Área do Administrador</p>
            <input type="password" id="senhaAdmin" placeholder="Senha de Admin">
            <button onclick="entrarAdmin()">Entrar no Painel</button>
            <p id="erroLogin" style="color: red; font-size: 14px; display: none; font-weight: bold;">Senha incorreta!</p>
        </div>
    </div>

    <div id="painelAdmin">
        <h1>⚙️ Administração - São Luiz</h1>
        
        <div class="abas">
            <div class="aba ativa" onclick="mudarAba('cadastro', this)">Cadastrar Família</div>
            <div class="aba" onclick="mudarAba('lista', this); carregarFamilias();">Lista de Famílias</div>
        </div>

        <div id="cadastro" class="conteudo-aba ativo">
            <h3 style="color: #333;">Nova Família</h3>
            <form id="formCadastro">
                <div class="form-group">
                    <label>Nome Completo (Responsável)</label>
                    <input type="text" id="cadNome" required placeholder="Ex: Maria Souza">
                </div>
                <div class="form-group">
                    <label>CPF (Apenas números)</label>
                    <input type="text" id="cadCpf" required placeholder="Ex: 00011122233">
                </div>
                <div class="form-group">
                    <label>Telefone WhatsApp (Ex: 5546999999999)</label>
                    <input type="text" id="cadTelefone" required placeholder="55469...">
                </div>
                <div class="form-group">
                    <label>Endereço / Lote</label>
                    <input type="text" id="cadEndereco" required placeholder="Ex: Casa 02">
                </div>
                <button type="submit" class="btn-sucesso">Salvar Família no Banco de Dados</button>
                <p id="msgCadastro" style="font-weight: bold; text-align: center; margin-top: 15px;"></p>
            </form>
        </div>

        <div id="lista" class="conteudo-aba">
            <h3 style="color: #333;">Famílias Cadastradas</h3>
            <p style="color: #555; font-weight: bold;">Total: <span id="totalFamilias">0</span> famílias</p>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Endereço</th>
                        <th>WhatsApp</th>
                    </tr>
                </thead>
                <tbody id="tabelaFamilias">
                    <tr><td colspan="4" style="text-align: center;">Buscando dados no Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // SUAS CHAVES DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCGXtcoSinCR6Kn7nDNf4ITWCelYW1PKBQ",
            authDomain: "sistema-agua-sao-luiz.firebaseapp.com",
            projectId: "sistema-agua-sao-luiz",
            storageBucket: "sistema-agua-sao-luiz.firebasestorage.app",
            messagingSenderId: "815174423700",
            appId: "1:815174423700:web:d1ffa58c09738c29a99081",
            measurementId: "G-K300HKHY2J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Como usamos type="module", precisamos atrelar as funções ao 'window' para o HTML conseguir chamar no onclick
        
        // LÓGICA DE LOGIN DO ADMIN
        window.entrarAdmin = function() {
            const senha = document.getElementById("senhaAdmin").value;
            // SENHA PADRÃO DE ACESSO AO PAINEL
            if (senha === "admin123") { 
                document.getElementById("loginAdmin").style.display = "none";
                document.getElementById("painelAdmin").style.display = "block";
            } else {
                document.getElementById("erroLogin").style.display = "block";
            }
        }

        // LÓGICA DE MUDAR DE ABA
        window.mudarAba = function(idAba, elementoClicado) {
            document.querySelectorAll('.conteudo-aba').forEach(aba => aba.classList.remove('ativo'));
            document.querySelectorAll('.aba').forEach(aba => aba.classList.remove('ativa'));
            
            document.getElementById(idAba).classList.add('ativo');
            elementoClicado.classList.add('ativa');
        }

        // LÓGICA PARA CADASTRAR NOVA FAMÍLIA NO FIREBASE
        document.getElementById("formCadastro").addEventListener("submit", async (e) => {
            e.preventDefault();
            const msg = document.getElementById("msgCadastro");
            const btn = document.querySelector(".btn-sucesso");
            
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                // Adiciona a família lá no Firestore
                await addDoc(collection(db, "familias"), {
                    nome: document.getElementById("cadNome").value,
                    cpf: document.getElementById("cadCpf").value,
                    telefone: document.getElementById("cadTelefone").value,
                    lote_endereco: document.getElementById("cadEndereco").value,
                    senha: "123456", // Senha padrão 123456 para o primeiro acesso
                    status_ativo: true
                });

                msg.style.color = "green";
                msg.innerText = "Família cadastrada com sucesso!";
                document.getElementById("formCadastro").reset();
                
                setTimeout(() => { msg.innerText = ""; }, 3000);

            } catch (error) {
                console.error("Erro ao cadastrar:", error);
                msg.style.color = "red";
                msg.innerText = "Erro ao cadastrar. Verifique a conexão.";
            } finally {
                btn.innerText = "Salvar Família no Banco de Dados";
                btn.disabled = false;
            }
        });

        // LÓGICA PARA LISTAR AS FAMÍLIAS DO FIREBASE
        window.carregarFamilias = async function() {
            const tabela = document.getElementById("tabelaFamilias");
            tabela.innerHTML = "<tr><td colspan='4' style='text-align: center;'>Buscando dados...</td></tr>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "familias"));
                let htmlTabela = "";
                let contador = 0;

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    contador++;
                    htmlTabela += `
                        <tr>
                            <td>${dados.nome}</td>
                            <td>${dados.cpf}</td>
                            <td>${dados.lote_endereco}</td>
                            <td>${dados.telefone}</td>
                        </tr>
                    `;
                });

                document.getElementById("totalFamilias").innerText = contador;
                
                if (contador === 0) {
                    tabela.innerHTML = "<tr><td colspan='4' style='text-align: center;'>Nenhuma família cadastrada ainda.</td></tr>";
                } else {
                    tabela.innerHTML = htmlTabela;
                }

            } catch (error) {
                console.error("Erro ao carregar lista:", error);
                tabela.innerHTML = "<tr><td colspan='4' style='text-align: center; color: red;'>Erro ao carregar dados do banco.</td></tr>";
            }
        }
    </script>
</body>
</html>
