<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Gestão 6.0 - Água São Luiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .tela-oculta { display: none !important; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* COLUNA FIXA COMPACTA */
        .coluna-fixa {
            position: sticky;
            left: 0;
            z-index: 20;
            background-color: white;
            border-right: 2px solid #e5e7eb;
            max-width: 140px; /* Nome mais estreito */
            min-width: 140px;
            white-space: normal; /* Quebra linha se o nome for grande */
            font-size: 0.8rem;
            line-height: 1.1;
        }
        th.coluna-fixa { background-color: #f8fafc; }
        .scroll-suave::-webkit-scrollbar { height: 8px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .conteudo-principal { padding-bottom: 80px; }
        
        /* Estilo para inputs focados (estilo planilha) */
        .input-leitura:focus {
            background-color: #fffbeb;
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <div id="loading" class="loading-overlay"><div class="spinner"></div><p id="loadingMsg" class="mt-4 font-bold text-gray-700 font-mono">Processando...</p></div>

    <!-- TELA DE LOGIN -->
    <div id="loginAdmin" class="fixed inset-0 bg-slate-900 flex justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <span class="text-5xl">💧</span>
            <h2 class="text-2xl font-bold mt-2 mb-6 text-slate-800">São Luiz Admin</h2>
            <input type="password" id="senhaAdmin" placeholder="Senha de Acesso" class="w-full p-4 border border-gray-300 rounded-xl mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="entrarAdmin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">Entrar no Sistema</button>
            <p id="erroLogin" class="text-red-500 text-sm font-bold mt-4 hidden">❌ Senha Incorreta!</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="painelAdmin" class="flex w-full h-full tela-oculta relative">
        <!-- SIDEBAR DESKTOP -->
        <aside class="w-64 bg-slate-900 text-white flex-col hidden md:flex shadow-xl z-30">
            <div class="p-6 text-center border-b border-slate-700"><h1 class="text-xl font-bold">💧 São Luiz</h1></div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="mudarAba('aba-moradores', this)" class="menu-btn w-full flex items-center p-3 rounded-xl bg-blue-600 text-white font-bold transition">👥 Moradores</button>
                <button onclick="mudarAba('aba-leituras', this); carregarLoteFaturas();" class="menu-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition">📝 Lançar</button>
                <button onclick="mudarAba('aba-recebimentos', this); carregarPagamentos();" class="menu-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition">✅ Pagos</button>
                <button onclick="mudarAba('aba-inadimplentes', this); carregarInadimplentes();" class="menu-btn w-full flex items-center p-3 rounded-xl hover:bg-slate-800 text-slate-400 font-bold transition">🚨 Atrasos</button>
            </nav>
        </aside>

        <!-- CONTEÚDO -->
        <main class="flex-1 overflow-y-auto bg-gray-100 conteudo-principal w-full">
            <div class="md:hidden bg-slate-900 text-white p-4 text-center sticky top-0 z-40 shadow-md font-bold">💧 Gestão São Luiz</div>
            
            <div class="p-4 md:p-8 max-w-7xl mx-auto w-full">

                <!-- ABA MORADORES -->
                <div id="aba-moradores" class="conteudo-aba">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-2xl font-bold">👥 Gestão de Moradores</h2>
                        <button onclick="abrirModalCadastro()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">➕ Novo Cadastro</button>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <input type="text" id="buscaMorador" onkeyup="filtrarTabela('buscaMorador', 'tabelaMoradores')" placeholder="🔍 Buscar morador ou lote..." class="w-full p-4 bg-gray-50 border-b outline-none focus:bg-white">
                        <div class="overflow-x-auto"><table class="w-full text-left whitespace-nowrap"><tbody id="tabelaMoradores" class="divide-y"></tbody></table></div>
                    </div>
                </div>

                <!-- ABA LEITURAS (A PARTE QUE VOCÊ USA MAIS) -->
                <div id="aba-leituras" class="conteudo-aba tela-oculta">
                    <div class="mb-4 flex justify-between items-end">
                        <h2 class="text-2xl font-bold">📝 Lançamento <span class="text-blue-600" id="txtRef">03/2026</span></h2>
                        <div class="flex gap-2 text-xs">
                            <input type="text" id="mesReferencia" value="03/2026" class="w-20 p-2 border rounded">
                            <input type="date" id="dataVencimento" value="2026-03-20" class="p-2 border rounded">
                        </div>
                    </div>
                    
                    <button onclick="gerarFaturasEmLote()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:bg-green-600 active:scale-95 transition mb-6">🚀 GERAR E SALVAR TUDO</button>

                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden relative">
                        <div class="overflow-x-auto scroll-suave">
                            <table class="w-full text-left border-collapse whitespace-nowrap">
                                <thead>
                                    <tr class="bg-slate-100 text-[10px] uppercase font-bold text-slate-500 border-b">
                                        <th class="p-3 coluna-fixa">Morador / Lote</th>
                                        <th class="p-3 text-center">Ant.</th>
                                        <th class="p-3 text-center">Atual</th>
                                        <th class="p-3 text-center">Cons.</th>
                                        <th class="p-3 text-right">Multa</th>
                                        <th class="p-3 text-right">Total R$</th>
                                        <th class="p-3 text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="corpoTabelaLote" class="divide-y text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-2 text-center">Dica: Use a tecla **ENTER** para pular para o próximo campo rapidamente.</p>
                </div>

                <!-- ABA RECEBIMENTOS -->
                <div id="aba-recebimentos" class="conteudo-aba tela-oculta">
                    <h2 class="text-2xl font-bold text-green-700 mb-6">✅ Recebidos</h2>
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><table class="w-full text-left whitespace-nowrap"><tbody id="tabelaPagos" class="divide-y"></tbody></table></div>
                </div>

                <!-- ABA INADIMPLENTES -->
                <div id="aba-inadimplentes" class="conteudo-aba tela-oculta">
                    <h2 class="text-2xl font-bold text-red-600 mb-6">🚨 Atrasados</h2>
                    <div class="bg-white rounded-2xl shadow-sm border border-red-100 overflow-hidden"><table class="w-full text-left whitespace-nowrap"><tbody id="tabelaAtrasados" class="divide-y"></tbody></table></div>
                </div>

            </div>
        </main>

        <!-- MENU MOBILE -->
        <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t flex justify-around items-center z-50 pb-2 shadow-inner">
            <button onclick="mudarAba('aba-moradores', this)" class="w-full p-3 flex flex-col items-center text-blue-600 font-bold"><span class="text-2xl">👥</span><span class="text-[10px]">Moradores</span></button>
            <button onclick="mudarAba('aba-leituras', this); carregarLoteFaturas();" class="w-full p-3 flex flex-col items-center text-gray-400 font-bold"><span class="text-2xl">📝</span><span class="text-[10px]">Lançar</span></button>
            <button onclick="mudarAba('aba-recebimentos', this); carregarPagamentos();" class="w-full p-3 flex flex-col items-center text-gray-400 font-bold"><span class="text-2xl">✅</span><span class="text-[10px]">Pagos</span></button>
            <button onclick="mudarAba('aba-inadimplentes', this); carregarInadimplentes();" class="w-full p-3 flex flex-col items-center text-gray-400 font-bold"><span class="text-2xl">🚨</span><span class="text-[10px]">Atrasos</span></button>
        </nav>
    </div>

    <!-- MODAL CADASTRO -->
    <div id="modalMorador" class="modal-fundo">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm mx-auto overflow-hidden">
            <div class="bg-slate-900 p-5 flex justify-between items-center text-white"><h3 id="tituloModal" class="font-bold">Morador</h3><button onclick="fecharModal()" class="text-2xl">×</button></div>
            <form id="formMorador" class="p-6 space-y-4">
                <input type="hidden" id="modId">
                <input type="text" id="modNome" required placeholder="Nome Completo" class="w-full p-3 bg-gray-100 rounded-xl outline-none border focus:border-blue-500">
                <input type="tel" id="modCpf" required placeholder="CPF (Só números)" class="w-full p-3 bg-gray-100 rounded-xl outline-none border focus:border-blue-500">
                <input type="tel" id="modTel" required placeholder="WhatsApp (55...)" class="w-full p-3 bg-gray-100 rounded-xl outline-none border focus:border-blue-500">
                <input type="text" id="modLote" required placeholder="Lote / Endereço" class="w-full p-3 bg-gray-100 rounded-xl outline-none border focus:border-blue-500">
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="fecharModal()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold">Sair</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGXtcoSinCR6Kn7nDNf4ITWCelYW1PKBQ",
            authDomain: "sistema-agua-sao-luiz.firebaseapp.com",
            projectId: "sistema-agua-sao-luiz",
            storageBucket: "sistema-agua-sao-luiz.firebasestorage.app",
            messagingSenderId: "815174423700",
            appId: "1:815174423700:web:d1ffa58c09738c29a99081",
            measurementId: "G-K300HKHY2J"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        // --- NAVEGAÇÃO E LOGIN ---
        window.entrarAdmin = () => {
            if(document.getElementById("senhaAdmin").value === "admin123") {
                document.getElementById("loginAdmin").style.display = "none";
                document.getElementById("painelAdmin").classList.remove('tela-oculta');
                carregarFamilias();
            } else { document.getElementById("erroLogin").classList.remove('hidden'); }
        };

        window.mudarAba = (id, el) => {
            document.querySelectorAll('.conteudo-aba').forEach(a => a.classList.add('tela-oculta'));
            document.getElementById(id).classList.remove('tela-oculta');
            document.querySelectorAll('.menu-btn').forEach(b => { b.classList.remove('bg-blue-600', 'text-white'); b.classList.add('text-slate-400'); });
            if(el) { el.classList.add('bg-blue-600', 'text-white'); }
        };

        // --- LÓGICA DO ENTER (MUITO IMPORTANTE PARA VOCÊ) ---
        window.handleEnter = (event, id, type) => {
            if (event.key === "Enter") {
                event.preventDefault();
                let next;
                if (type === 'ant') {
                    next = document.getElementById('atu-' + id);
                } else {
                    // Se estiver no campo 'atual', pula para o campo 'anterior' do próximo morador
                    const inputsAnt = Array.from(document.querySelectorAll('input[id^="ant-"]'));
                    const currentIndex = inputsAnt.findIndex(i => i.id === 'ant-' + id);
                    if (currentIndex < inputsAnt.length - 1) {
                        next = inputsAnt[currentIndex + 1];
                    }
                }
                if (next) next.focus();
            }
        };

        // --- MORADORES ---
        window.carregarFamilias = async () => {
            const tbody = document.getElementById("tabelaMoradores");
            tbody.innerHTML = "<tr><td class='p-8 text-center'>Buscando...</td></tr>";
            try {
                const snap = await getDocs(collection(db, "familias"));
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    html += `<tr><td class="p-4"><strong>${data.nome}</strong><br><small>${data.lote_endereco}</small></td><td class="p-4 text-center"><button onclick="abrirModalEdicao('${d.id}','${data.nome}','${data.cpf}','${data.telefone}','${data.lote_endereco}')" class="text-blue-600 font-bold px-3 py-1 bg-blue-50 rounded">Editar</button></td></tr>`;
                });
                tbody.innerHTML = html;
            } catch (e) { tbody.innerHTML = "Erro"; }
        };

        // --- LANÇAMENTO DE LEITURAS ---
        window.carregarLoteFaturas = async () => {
            const corpo = document.getElementById("corpoTabelaLote");
            corpo.innerHTML = "<tr><td colspan='7' class='p-8 text-center'>Calculando inadimplentes...</td></tr>";
            try {
                const famSnap = await getDocs(collection(db, "familias"));
                const fatSnap = await getDocs(collection(db, "faturas"));
                const faturas = [];
                fatSnap.forEach(d => faturas.push(d.data()));

                let html = "";
                const hoje = new Date(); hoje.setHours(0,0,0,0);

                famSnap.forEach(docFam => {
                    const f = docFam.data();
                    const famId = docFam.id;
                    const temAtraso = faturas.some(fat => fat.familia_id === famId && fat.status === 'pendente' && new Date(fat.vencimento + "T00:00:00") < hoje);
                    const multa = temAtraso ? 25.0 : 0.0;

                    html += `
                        <tr id="linha-${famId}">
                            <td class="p-3 coluna-fixa"><strong>${f.nome}</strong><br><small>${f.lote_endereco}</small></td>
                            <td class="p-2 text-center"><input type="number" id="ant-${famId}" onkeyup="calcularLinha('${famId}', ${multa})" onkeydown="handleEnter(event, '${famId}', 'ant')" class="w-16 p-2 border rounded-lg text-center outline-none"></td>
                            <td class="p-2 text-center"><input type="number" id="atu-${famId}" onkeyup="calcularLinha('${famId}', ${multa})" onkeydown="handleEnter(event, '${famId}', 'atu')" class="w-16 p-2 border-2 border-blue-400 bg-blue-50 rounded-lg text-center font-bold outline-none"></td>
                            <td class="p-2 text-center font-bold text-blue-600"><span id="cons-${famId}">0</span></td>
                            <td class="p-2 text-right text-red-500 font-bold">R$ ${multa.toFixed(2)}</td>
                            <td class="p-2 text-right font-black text-green-700 text-lg">R$ <span id="valTotal-${famId}">0,00</span>
                                <input type="hidden" id="h-total-${famId}" value="0" data-multa="${multa}" data-nome="${f.nome}" data-cpf="${f.cpf}" data-tel="${f.telefone}">
                                <input type="hidden" id="h-agua-${famId}" value="0">
                            </td>
                            <td class="p-2 text-center" id="status-${famId}"><small class="text-gray-400">---</small></td>
                        </tr>
                    `;
                });
                corpo.innerHTML = html;
            } catch (e) { corpo.innerHTML = "Erro ao carregar."; }
        };

        window.calcularLinha = (id, multa) => {
            const ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
            const atu = parseFloat(document.getElementById(`atu-${id}`).value) || 0;
            let consumo = (atu >= ant && atu > 0) ? atu - ant : 0;
            document.getElementById(`cons-${id}`).innerText = consumo;

            let vAgua = 0;
            if (consumo > 0) {
                if (consumo <= 10) vAgua = 25.0;
                else if (consumo <= 30) vAgua = 50.0;
                else vAgua = 100.0;
            }
            const total = vAgua > 0 ? vAgua + multa : 0;
            document.getElementById(`valTotal-${id}`).innerText = total.toFixed(2).replace('.', ',');
            document.getElementById(`h-agua-${id}`).value = vAgua;
            document.getElementById(`h-total-${id}`).value = total;
        };

        window.gerarFaturasEmLote = async () => {
            const inputs = document.querySelectorAll('input[id^="h-total-"]');
            const linhas = Array.from(inputs).filter(i => parseFloat(i.value) > 0);
            if(linhas.length === 0) return alert("Preencha alguém!");
            
            mostrarLoading(`Gerando ${linhas.length} faturas...`);
            const mes = document.getElementById("mesReferencia").value;
            const venc = document.getElementById("dataVencimento").value;

            for(let input of linhas) {
                const total = parseFloat(input.value);
                const id = input.id.replace('h-total-', '');
                const vAgua = parseFloat(document.getElementById(`h-agua-${id}`).value);
                const vMulta = parseFloat(input.dataset.multa);
                const nome = input.dataset.nome;
                const cpf = input.dataset.cpf.replace(/\D/g, '');
                const tel = input.dataset.tel;
                const l_ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
                const l_atu = parseFloat(document.getElementById(`atu-${id}`).value) || 0;

                try {
                    const res = await fetch("/api/gerar-pix", {
                        method: "POST", headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ valor: total, descricao: `Água ${mes}`, nome, cpf })
                    });
                    const pix = await res.json();
                    if(pix.sucesso) {
                        await addDoc(collection(db, "faturas"), {
                            familia_id: id, mes_referencia: mes, leitura_anterior: l_ant, leitura_atual: l_atu,
                            consumo_m3: l_atu - l_ant, valor_agua: vAgua, valor_multa: vMulta, valor_total: total, 
                            vencimento: venc, status: "pendente", pix_copia_cola: pix.copiaECola, qr_code_base64: pix.qrCodeBase64,
                            pix_txid: String(pix.txid), data_lancamento: new Date().toISOString()
                        });
                        const zap = `Olá *${nome}*! Fatura ${mes} liberada.\n💰 Valor: R$ ${total.toFixed(2)}\n📅 Venc: ${venc.split('-').reverse().join('/')}\n\n👉 https://agua-sao-luiz.vercel.app`;
                        document.getElementById(`status-${id}`).innerHTML = `<button onclick="window.open('https://wa.me/${tel}?text=${encodeURIComponent(zap)}')" class="bg-green-500 text-white font-bold p-2 rounded-lg">ZAP</button>`;
                        document.getElementById(`linha-${id}`).style.backgroundColor = "#f0fdf4";
                    }
                } catch(e) { document.getElementById(`status-${id}`).innerText = "Erro"; }
            }
            esconderLoading();
            alert("✅ Concluído!");
        };

        // --- EXCLUIR FATURA (ETAPA 2) ---
        window.carregarInadimplentes = async () => {
            const tbody = document.getElementById("tabelaAtrasados");
            tbody.innerHTML = "<tr><td class='p-8 text-center'>Buscando...</td></tr>";
            try {
                const famSnap = await getDocs(collection(db, "familias"));
                const dict = {}; famSnap.forEach(d => dict[d.id] = d.data().nome);
                const fatSnap = await getDocs(collection(db, "faturas"));
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                let html = "";
                fatSnap.forEach(d => {
                    const f = d.data();
                    if(f.status === 'pendente' && new Date(f.vencimento + "T00:00:00") < hoje) {
                        html += `<tr><td class="p-4"><strong>${dict[f.familia_id]}</strong><br><small>${f.mes_referencia}</small></td><td class="p-4 text-red-600 font-bold">R$ ${f.valor_total.toFixed(2)}</td><td class="p-4 text-right flex gap-2 justify-end"><button onclick="marcarComoPagoManual('${d.id}')" class="bg-blue-600 text-white p-2 rounded-lg text-xs font-bold">Pago</button><button onclick="excluirFatura('${d.id}')" class="bg-red-100 text-red-600 p-2 rounded-lg text-xs font-bold">🗑️</button></td></tr>`;
                    }
                });
                tbody.innerHTML = html || "<tr><td class='p-8 text-center'>Nenhum atraso.</td></tr>";
            } catch(e) { tbody.innerHTML = "Erro"; }
        };

        window.excluirFatura = async (id) => {
            if(!confirm("⚠️ ATENÇÃO: Deseja realmente EXCLUIR este boleto? Esta ação não pode ser desfeita!")) return;
            mostrarLoading("Excluindo...");
            try {
                await deleteDoc(doc(db, "faturas", id));
                carregarInadimplentes();
                alert("Boleto excluído com sucesso.");
            } catch(e) { alert("Erro ao excluir."); }
            esconderLoading();
        };

        window.marcarComoPagoManual = async (id) => {
            await updateDoc(doc(db, "faturas", id), { status: "pago", data_pagamento: new Date().toISOString() });
            carregarInadimplentes();
        };

        // Funções de Modal e UI helpers
        window.abrirModalCadastro = () => { document.getElementById("formMorador").reset(); document.getElementById("modId").value = ""; document.getElementById("modalMorador").style.display = "flex"; };
        window.abrirModalEdicao = (id, nome, cpf, tel, lote) => { document.getElementById("modId").value = id; document.getElementById("modNome").value = nome; document.getElementById("modCpf").value = cpf; document.getElementById("modTel").value = tel; document.getElementById("modLote").value = lote; document.getElementById("modalMorador").style.display = "flex"; };
        window.fecharModal = () => document.getElementById("modalMorador").style.display = "none";
        const mostrarLoading = (msg) => { document.getElementById("loadingMsg").innerText = msg; document.getElementById("loading").style.display = "flex"; };
        const esconderLoading = () => document.getElementById("loading").style.display = "none";
        
        document.getElementById("formMorador").addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("modId").value;
            const d = { nome: document.getElementById("modNome").value, cpf: document.getElementById("modCpf").value, telefone: document.getElementById("modTel").value, lote_endereco: document.getElementById("modLote").value };
            if(id) await updateDoc(doc(db, "familias", id), d); else await addDoc(collection(db, "familias"), {...d, senha: "123456", status_ativo: true});
            fecharModal(); carregarFamilias();
        });
    </script>
</body>
</html>
