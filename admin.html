<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin 3.0 - São Luiz</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        #loginAdmin { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1c2b36; }
        .login-box { background: white; padding: 2.5rem; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1.5px solid #ddd; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #painelAdmin { display: none; max-width: 1200px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { color: #1c2b36; text-align: center; margin-bottom: 30px; }
        
        .abas { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; overflow-x: auto; }
        .aba { padding: 12px 25px; cursor: pointer; font-weight: 600; color: #666; white-space: nowrap; transition: 0.3s; }
        .aba:hover { color: #007bff; }
        .aba.ativa { border-bottom: 4px solid #007bff; color: #007bff; }
        
        .conteudo-aba { display: none; }
        .conteudo-aba.ativo { display: block; }

        /* Tabela Lote com Hidrômetro */
        .tabela-lote { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 14px; }
        .tabela-lote th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; color: #333; }
        .tabela-lote td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .input-leitura { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }
        .input-leitura:focus { border-color: #007bff; outline: none; }
        
        .destaque-valor { font-weight: bold; color: #28a745; font-size: 16px; }
        .destaque-consumo { font-weight: bold; color: #17a2b8; }

        .btn-acao { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-salvar-lote { background-color: #28a745; margin-bottom: 20px; width: 100%; font-size: 16px; }
        .btn-zap-lote { background-color: #25D366; padding: 6px 10px; font-size: 12px; }
        
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-sucesso { background: #d4edda; color: #155724; }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div style="border: 5px solid #f3f3f3; border-top: 5px solid #28a745; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; font-weight: bold; color: #333;" id="loadingMsg">Processando faturas...</p>
    </div>

    <div id="loginAdmin">
        <div class="login-box">
            <h2>Acesso Restrito</h2>
            <input type="password" id="senhaAdmin" placeholder="Senha">
            <button onclick="entrarAdmin()">Entrar</button>
        </div>
    </div>

    <div id="painelAdmin">
        <h1>⚙️ Sistema de Água São Luiz</h1>
        
        <div class="abas">
            <div class="aba ativa" onclick="mudarAba('cadastro', this)">Cadastrar Família</div>
            <div class="aba" onclick="mudarAba('lista', this); carregarFamilias();">Lista de Moradores</div>
            <div class="aba" onclick="mudarAba('lote', this); carregarLoteFaturas();">Leituras do Mês</div>
        </div>

        <div id="cadastro" class="conteudo-aba ativo">
            <h3>Novo Cadastro</h3>
            <form id="formCadastro">
                <input type="text" id="cadNome" required placeholder="Nome Completo" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="text" id="cadCpf" required placeholder="CPF (Só números)" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="text" id="cadTelefone" required placeholder="WhatsApp (DDD+Nmero)" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="text" id="cadEndereco" required placeholder="Lote / Endereço" style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" class="btn-acao" style="background:#007bff; width:100%;">Salvar Morador</button>
            </form>
        </div>

        <div id="lista" class="conteudo-aba">
            <h3>Moradores Ativos</h3>
            <div id="tabelaLista"></div>
        </div>

        <div id="lote" class="conteudo-aba">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h3>Lançamento de Leituras</h3>
                <div>
                    <label>Mês:</label>
                    <input type="text" id="mesReferencia" value="03/2026" style="padding: 5px; width: 80px;">
                    <label style="margin-left: 10px;">Vencimento:</label>
                    <input type="date" id="dataVencimento" value="2026-03-20" style="padding: 5px;">
                </div>
            </div>
            
            <button onclick="gerarFaturasEmLote()" class="btn-acao btn-salvar-lote" id="btnProcessarTudo">
                🚀 GERAR TODAS AS FATURAS PREENCHIDAS
            </button>

            <div style="overflow-x: auto;">
                <table class="tabela-lote">
                    <thead>
                        <tr>
                            <th>Morador / Lote</th>
                            <th>Leitura Anterior</th>
                            <th>Leitura Atual</th>
                            <th>Consumo (m³)</th>
                            <th>Valor R$</th>
                            <th>Status / Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaLote">
                        <tr><td colspan="6" style="text-align:center;">Carregando moradores...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGXtcoSinCR6Kn7nDNf4ITWCelYW1PKBQ",
            authDomain: "sistema-agua-sao-luiz.firebaseapp.com",
            projectId: "sistema-agua-sao-luiz",
            storageBucket: "sistema-agua-sao-luiz.firebasestorage.app",
            messagingSenderId: "815174423700",
            appId: "1:815174423700:web:d1ffa58c09738c29a99081",
            measurementId: "G-K300HKHY2J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.entrarAdmin = () => {
            if(document.getElementById("senhaAdmin").value === "admin123") {
                document.getElementById("loginAdmin").style.display = "none";
                document.getElementById("painelAdmin").style.display = "block";
            } else { alert("Senha incorreta"); }
        };

        window.mudarAba = (id, el) => {
            document.querySelectorAll('.conteudo-aba').forEach(a => a.classList.remove('ativo'));
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativo');
            el.classList.add('ativa');
        };

        // Carregar Tabela com Lógica do Hidrômetro
        window.carregarLoteFaturas = async () => {
            const corpo = document.getElementById("corpoTabelaLote");
            corpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Buscando moradores no banco...</td></tr>";
            
            try {
                const snap = await getDocs(collection(db, "familias"));
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    // Colocamos eventos onkeyup para calcular automaticamente
                    html += `
                        <tr id="linha-${doc.id}">
                            <td><strong>${d.nome}</strong><br><small style="color:#666;">Lote: ${d.lote_endereco}</small></td>
                            <td><input type="number" class="input-leitura" id="ant-${doc.id}" onkeyup="calcularLinha('${doc.id}')" placeholder="Ex: 100"></td>
                            <td><input type="number" class="input-leitura" id="atu-${doc.id}" onkeyup="calcularLinha('${doc.id}')" placeholder="Ex: 115"></td>
                            <td><span class="destaque-consumo" id="cons-${doc.id}">0</span> m³</td>
                            <td>
                                R$ <span class="destaque-valor" id="val-${doc.id}">0,00</span>
                                <input type="hidden" id="val-hidden-${doc.id}" value="0" data-nome="${d.nome}" data-cpf="${d.cpf}" data-tel="${d.telefone}">
                            </td>
                            <td id="status-${doc.id}"><span class="badge-status">Pendente</span></td>
                        </tr>
                    `;
                });
                corpo.innerHTML = html;
            } catch (error) {
                corpo.innerHTML = "<tr><td colspan='6' style='color:red;'>Erro ao carregar dados.</td></tr>";
            }
        };

        // LÓGICA DE PREÇOS (O CÉREBRO DO HIDRÔMETRO)
        window.calcularLinha = (id) => {
            const ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
            const atu = parseFloat(document.getElementById(`atu-${id}`).value) || 0;
            
            // Só calcula se a atual for maior que a anterior e não for zero
            let consumo = 0;
            if (atu >= ant && atu > 0) {
                consumo = atu - ant;
            }
            
            document.getElementById(`cons-${id}`).innerText = consumo;

            // Regras de Preço da Água São Luiz
            let valor = 0;
            if (consumo > 0) {
                if (consumo <= 10) {
                    valor = 25.00;
                } else if (consumo <= 30) {
                    valor = 50.00;
                } else {
                    valor = 100.00;
                }
            }

            document.getElementById(`val-${id}`).innerText = valor.toFixed(2).replace('.', ',');
            document.getElementById(`val-hidden-${id}`).value = valor;
        };

        // Gerar Faturas Prontas
        window.gerarFaturasEmLote = async () => {
            // Pega todos os inputs ocultos que guardam o valor
            const inputs = document.querySelectorAll('input[id^="val-hidden-"]');
            // Filtra só as linhas que o valor for maior que 0
            const linhasParaProcessar = Array.from(inputs).filter(i => parseFloat(i.value) > 0);
            const total = linhasParaProcessar.length;
            
            if(total === 0) return alert("Preencha a Leitura Atual de pelo menos um morador para gerar consumo!");
            if(!confirm(`Deseja gerar e enviar para o banco as faturas de ${total} moradores?`)) return;

            document.getElementById("loading").style.display = "flex";
            let processados = 0;
            const mes = document.getElementById("mesReferencia").value;
            const venc = document.getElementById("dataVencimento").value;

            for(let input of linhasParaProcessar) {
                processados++;
                document.getElementById("loadingMsg").innerText = `Processando ${processados} de ${total}...`;
                
                const valor = parseFloat(input.value);
                const id = input.id.replace('val-hidden-', '');
                const nome = input.dataset.nome;
                const cpf = input.dataset.cpf.replace(/\D/g, '');
                const tel = input.dataset.tel;
                
                const leitura_ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
                const leitura_atu = parseFloat(document.getElementById(`atu-${id}`).value) || 0;
                const consumo_calc = leitura_atu - leitura_ant;

                try {
                    const res = await fetch("/api/gerar-pix", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ valor, descricao: `Água ${mes} - L.Atual: ${leitura_atu}`, nome, cpf })
                    });
                    const pix = await res.json();

                    if(pix.sucesso) {
                        // SALVA O HISTÓRICO COMPLETO NO FIREBASE
                        await addDoc(collection(db, "faturas"), {
                            familia_id: id, 
                            mes_referencia: mes,
                            leitura_anterior: leitura_ant,
                            leitura_atual: leitura_atu,
                            consumo_m3: consumo_calc,
                            valor_total: valor, 
                            vencimento: venc, 
                            status: "pendente",
                            pix_copia_cola: pix.copiaECola,
                            data_lancamento: new Date().toISOString()
                        });

                        // Mensagem de WhatsApp isolando o código
                        const texto = `Olá ${nome}! Segue a fatura da Água de ${mes}.\n\n💧 Consumo: ${consumo_calc}m³\n💰 Valor: R$ ${valor.toFixed(2)}\n📅 Vencimento: ${venc.split('-').reverse().join('/')}\n\n*Pix Copia e Cola (toque e segure abaixo para copiar):*\n\n${pix.copiaECola}`;
                        const link = `https://wa.me/${tel}?text=${encodeURIComponent(texto)}`;

                        document.getElementById(`status-${id}`).innerHTML = `
                            <span class="badge-status status-sucesso">Gerado!</span><br>
                            <button onclick="window.open('${link}', '_blank')" class="btn-acao btn-zap-lote" style="margin-top:5px;">📲 Enviar Zap</button>
                        `;
                        
                        // Bloqueia as caixas para não editar mais
                        document.getElementById(`ant-${id}`).disabled = true;
                        document.getElementById(`atu-${id}`).disabled = true;
                        document.getElementById(`linha-${id}`).style.backgroundColor = "#e8f5e9";
                    }
                } catch (e) {
                    console.error(e);
                    document.getElementById(`status-${id}`).innerHTML = `<span style="color:red; font-size:11px; font-weight:bold;">ERRO DE CONEXÃO</span>`;
                }
            }
            document.getElementById("loading").style.display = "none";
            alert("Lote processado com sucesso! As faturas já estão no painel dos moradores.");
        };

        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
