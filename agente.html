<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta - Água São Luiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <div id="loading" class="loading-overlay"><div class="spinner"></div><p id="loadingMsg" class="mt-4 font-bold text-gray-700">A processar...</p></div>

    <div id="loginAgente" class="fixed inset-0 bg-slate-900 flex justify-center items-center z-50 p-4">
        <form onsubmit="entrarAgente(event)" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="bg-blue-100 w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-droplet text-4xl text-blue-600"></i></div>
            <h2 class="text-2xl font-black mb-1 text-slate-800">Portal do Leiturista</h2>
            <p class="text-sm text-gray-500 mb-6">Acesso restrito para coleta de dados</p>
            <input type="password" id="senhaAgente" required placeholder="Senha do Agente..." class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-lg outline-none focus:border-blue-500 transition">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition text-lg">Acessar</button>
        </form>
    </div>

    <div id="painelAgente" class="flex flex-col w-full h-full hidden">
        <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-40">
            <div>
                <h1 class="font-black text-lg leading-tight">Água São Luiz</h1>
                <p class="text-[10px] text-slate-400">Modo Coleta</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="statusConexao" class="flex items-center gap-1 bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/30">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                    Online
                </div>
                <button onclick="sairAgente()" class="text-red-400 p-2"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-slate-700 text-lg"><i class="fa-solid fa-clipboard-list text-blue-600 mr-2"></i>Leituras do Mês</h2>
                <span id="contadorLeituras" class="bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-lg text-xs">0 pendentes</span>
            </div>

            <input type="text" id="buscaMorador" onkeyup="filtrarCards()" placeholder="🔍 Buscar morador ou endereço..." class="w-full p-4 bg-white shadow-sm border border-gray-200 rounded-2xl mb-4 outline-none focus:border-blue-500 text-sm">

            <div id="listaCards" class="space-y-4">
                <p class="text-center text-gray-400 text-sm mt-10">A carregar dados dos moradores...</p>
            </div>
        </main>
        
        <div class="fixed bottom-0 w-full bg-white border-t p-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="sincronizarEGerarLote()" id="btnSincronizar" class="w-full bg-green-500 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition flex justify-center items-center gap-2 text-lg">
                <i class="fa-solid fa-cloud-arrow-up"></i> Sincronizar e Gerar Faturas
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, enableIndexedDbPersistence, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGXtcoSinCR6Kn7nDNf4ITWCelYW1PKBQ",
            authDomain: "sistema-agua-sao-luiz.firebaseapp.com",
            projectId: "sistema-agua-sao-luiz"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ativar Persistência Offline do Firebase (A Mágica)
        enableIndexedDbPersistence(db).catch((err) => {
            if (err.code == 'failed-precondition') console.log("Abas múltiplas abertas. Offline não suportado.");
            else if (err.code == 'unimplemented') console.log("Navegador não suporta offline.");
        });

        let moradoresGlobal = [];

        // Controle Online/Offline Visual
        const atualizarStatusRede = () => {
            const el = document.getElementById("statusConexao");
            const btnSync = document.getElementById("btnSincronizar");
            if (navigator.onLine) {
                el.innerHTML = '<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span> Online';
                el.className = "flex items-center gap-1 bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/30";
                btnSync.classList.remove("opacity-50", "pointer-events-none");
                btnSync.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Sincronizar e Gerar Faturas';
            } else {
                el.innerHTML = '<i class="fa-solid fa-plane-slash"></i> Offline';
                el.className = "flex items-center gap-1 bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-xs font-bold border border-red-500/30";
                btnSync.classList.add("opacity-50", "pointer-events-none");
                btnSync.innerHTML = '<i class="fa-solid fa-wifi"></i> Requer Internet para Sincronizar';
            }
        };
        window.addEventListener('online', atualizarStatusRede);
        window.addEventListener('offline', atualizarStatusRede);
        atualizarStatusRede();

        // Login Simples
        window.entrarAgente = (e) => {
            e.preventDefault();
            if(document.getElementById("senhaAgente").value === "agente123") {
                localStorage.setItem("agente_logado", "sim");
                document.getElementById("loginAgente").style.display = "none";
                document.getElementById("painelAgente").classList.remove('hidden');
                carregarListaColeta();
            } else { alert("Senha incorreta!"); }
        };

        window.sairAgente = () => { localStorage.removeItem("agente_logado"); location.reload(); };

        if(localStorage.getItem("agente_logado") === "sim") {
            document.getElementById("loginAgente").style.display = "none";
            document.getElementById("painelAgente").classList.remove('hidden');
            carregarListaColeta();
        }

        // Regras de Negócio e Cálculos
        const val1 = parseFloat(localStorage.getItem('agua_val1')) || 25;
        const val2 = parseFloat(localStorage.getItem('agua_val2')) || 50;
        const val3 = parseFloat(localStorage.getItem('agua_val3')) || 100;
        const multaPadrao = parseFloat(localStorage.getItem('config_multa_padrao')) || 25.00;

        window.calcularTotalCard = (id) => {
            const ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
            const atuStr = document.getElementById(`atu-${id}`).value;
            const atu = atuStr === "" ? ant : parseFloat(atuStr);
            const multa = parseFloat(document.getElementById(`multa-${id}`).value) || 0;
            const taxa = parseFloat(document.getElementById(`taxa-${id}`).value) || 0;

            let consumo = (atu >= ant && atu > 0) ? atu - ant : 0;
            document.getElementById(`cons-${id}`).innerText = consumo + " m³";

            let vAgua = 0;
            if (consumo > 0) { if (consumo <= 10) vAgua = val1; else if (consumo <= 30) vAgua = val2; else vAgua = val3; }

            const total = vAgua + multa + taxa;
            document.getElementById(`total-${id}`).innerText = "R$ " + total.toFixed(2).replace('.', ',');
            
            // Salva temporariamente no elemento para quando for sincronizar
            document.getElementById(`card-${id}`).dataset.valoragua = vAgua;
            document.getElementById(`card-${id}`).dataset.valortotal = total;
            document.getElementById(`card-${id}`).dataset.consumo = consumo;
        };

        // Carrega as Famílias do Firebase (usa cache se estiver offline)
        async function carregarListaColeta() {
            document.getElementById("loading").style.display = "flex";
            try {
                const snap = await getDocs(collection(db, "familias"));
                moradoresGlobal = [];
                snap.forEach(d => moradoresGlobal.push({id: d.id, ...d.data()}));
                moradoresGlobal.sort((a,b) => (a.nome || "").localeCompare(b.nome || "", 'pt-BR'));
                renderizarCards(moradoresGlobal);
            } catch(e) {
                console.error("Erro ao carregar dados", e);
                document.getElementById("listaCards").innerHTML = "<p class='text-red-500 text-center font-bold'>Erro ao aceder dados offline.</p>";
            }
            document.getElementById("loading").style.display = "none";
        }

        function renderizarCards(lista) {
            let html = "";
            let pendentes = 0;
            
            lista.forEach(f => {
                const taxa = f.taxa_pendente_valor || 0;
                // Exibe no ecrã apenas se não tiver preenchido ainda nesta sessão
                pendentes++;
                html += `
                <div class="card-morador bg-white border border-gray-200 p-4 rounded-2xl shadow-sm" id="card-${f.id}" data-nome="${f.nome.toLowerCase()}" data-cpf="${f.cpf}" data-telefone="${f.telefone}" data-taxa="${taxa}" data-desc="${f.taxa_pendente_desc || ""}">
                    <div class="flex justify-between items-start border-b pb-3 mb-3">
                        <div>
                            <h3 class="font-black text-slate-800 leading-tight">${f.nome}</h3>
                            <p class="text-[10px] text-gray-500 font-mono mt-1">${f.lote_endereco || "Sem endereço"}</p>
                            ${taxa > 0 ? `<span class="bg-amber-100 text-amber-700 text-[9px] font-black px-2 py-0.5 rounded-full mt-1 inline-block uppercase">Taxa Avulsa: R$ ${taxa}</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div class="bg-gray-50 p-2 rounded-xl text-center border border-gray-100">
                            <span class="block text-[9px] font-bold text-gray-400 uppercase mb-1">Anterior</span>
                            <input type="number" id="ant-${f.id}" value="${f.ultima_leitura || 0}" readonly class="w-full bg-transparent text-center font-bold text-gray-600 outline-none">
                        </div>
                        <div class="bg-blue-50 p-2 rounded-xl text-center border-2 border-blue-200">
                            <span class="block text-[9px] font-black text-blue-600 uppercase mb-1">Atual</span>
                            <input type="number" inputmode="numeric" id="atu-${f.id}" oninput="calcularTotalCard('${f.id}')" placeholder="Digitar" class="w-full bg-transparent text-center font-black text-blue-800 text-lg outline-none">
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-100 mb-3">
                        <div class="flex-1">
                            <label class="block text-[9px] font-bold text-gray-500 uppercase mb-1">Consumo</label>
                            <span id="cons-${f.id}" class="font-black text-blue-600">0 m³</span>
                        </div>
                        <div class="flex-1 border-l pl-3 border-gray-200">
                            <label class="block text-[9px] font-bold text-red-400 uppercase mb-1">Multa (R$)</label>
                            <input type="number" step="0.01" id="multa-${f.id}" value="0.00" oninput="calcularTotalCard('${f.id}')" class="w-full bg-white border border-red-100 p-1 text-center font-bold text-red-600 rounded outline-none text-sm">
                            <input type="hidden" id="taxa-${f.id}" value="${taxa}">
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-slate-900 text-white p-3 rounded-xl">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total a Pagar</span>
                        <span id="total-${f.id}" class="font-black text-lg text-green-400">R$ 0,00</span>
                    </div>
                </div>
                `;
            });
            document.getElementById("listaCards").innerHTML = html;
            document.getElementById("contadorLeituras").innerText = `${pendentes} pendentes`;
            
            // Inicializa cálculos base
            lista.forEach(f => calcularTotalCard(f.id));
        }

        window.filtrarCards = () => {
            const termo = document.getElementById("buscaMorador").value.toLowerCase();
            const cards = document.querySelectorAll(".card-morador");
            cards.forEach(c => {
                const nome = c.dataset.nome;
                if(nome.includes(termo)) c.style.display = "block";
                else c.style.display = "none";
            });
        };

        // --- SINCRONIZAÇÃO E GERAÇÃO COM A API DO PIX (REQUER INTERNET) ---
        window.sincronizarEGerarLote = async () => {
            if(!navigator.onLine) {
                alert("Você precisa estar conectado à internet para gerar o PIX e sincronizar com o robô.");
                return;
            }

            const cards = document.querySelectorAll(".card-morador");
            let faturasParaGerar = [];

            cards.forEach(card => {
                const id = card.id.replace('card-', '');
                const atuVal = document.getElementById(`atu-${id}`).value;
                const total = parseFloat(card.dataset.valortotal) || 0;
                
                // Só processa quem preencheu a leitura atual ou já tem valor a pagar (multa/taxa)
                if (atuVal !== "" || total > 0) {
                    faturasParaGerar.push({
                        familia_id: id,
                        nome: document.querySelector(`#card-${id} h3`).innerText,
                        cpf: card.dataset.cpf.replace(/\D/g, ''),
                        telefone: card.dataset.telefone,
                        leitura_anterior: parseFloat(document.getElementById(`ant-${id}`).value) || 0,
                        leitura_atual: parseFloat(atuVal) || parseFloat(document.getElementById(`ant-${id}`).value),
                        consumo_m3: parseFloat(card.dataset.consumo),
                        valor_agua: parseFloat(card.dataset.valoragua),
                        valor_multa: parseFloat(document.getElementById(`multa-${id}`).value) || 0,
                        taxa_extra: parseFloat(card.dataset.taxa),
                        desc_taxa: card.dataset.desc,
                        valor_total: total
                    });
                }
            });

            if (faturasParaGerar.length === 0) {
                return alert("Nenhuma leitura nova preenchida para sincronizar.");
            }

            if(!confirm(`Gerar ${faturasParaGerar.length} faturas no servidor e enviar para o WhatsApp?`)) return;

            document.getElementById("loadingMsg").innerText = `A Sincronizar ${faturasParaGerar.length} faturas...`;
            document.getElementById("loading").style.display = "flex";

            const dataAtual = new Date();
            const mesStr = `${String(dataAtual.getMonth() + 1).padStart(2, '0')}/${dataAtual.getFullYear()}`;
            // Joga vencimento para o dia 20 do mês atual ou próximo
            const vencimentoStr = `${dataAtual.getFullYear()}-${String(dataAtual.getMonth() + 1).padStart(2, '0')}-20`;

            let sucessoCont = 0;

            for (let fat of faturasParaGerar) {
                let descFinal = `Água ${mesStr}`;
                if(fat.taxa_extra > 0) descFinal += ` + ${fat.desc_taxa}`;

                try {
                    // API do PIX (Por isso precisa de Internet)
                    const res = await fetch("/api/gerar-pix", { 
                        method: "POST", headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ valor: fat.valor_total, descricao: descFinal, nome: fat.nome, cpf: fat.cpf }) 
                    });
                    const pix = await res.json();

                    if(pix.sucesso) {
                        // Grava no Firebase sinalizando o Robô (whatsapp_enviado: false)
                        await addDoc(collection(db, "faturas"), { 
                            familia_id: fat.familia_id, 
                            mes_referencia: descFinal, 
                            leitura_anterior: fat.leitura_anterior, 
                            leitura_atual: fat.leitura_atual, 
                            consumo_m3: fat.consumo_m3, 
                            valor_agua: fat.valor_agua, 
                            valor_multa: fat.valor_multa, 
                            taxa_extra: fat.taxa_extra, 
                            valor_total: fat.valor_total, 
                            vencimento: vencimentoStr, 
                            status: "pendente", 
                            whatsapp_enviado: false, // ROBÔ VAI LER AQUI
                            pix_copia_cola: pix.copiaECola, 
                            qr_code_base64: pix.qrCodeBase64, 
                            pix_txid: String(pix.txid), 
                            data_lancamento: new Date().toISOString(), 
                            telefone: fat.telefone, 
                            nome_morador: fat.nome 
                        });
                        
                        // Atualiza a família
                        await updateDoc(doc(db, "familias", fat.familia_id), { 
                            ultima_leitura: fat.leitura_atual, 
                            taxa_pendente_valor: 0, 
                            taxa_pendente_desc: "" 
                        });

                        sucessoCont++;
                        // Esconde o card que já foi sincronizado
                        document.getElementById(`card-${fat.familia_id}`).style.display = "none";
                    }
                } catch(e) {
                    console.error(`Falha no PIX de ${fat.nome}`, e);
                }
            }

            document.getElementById("loading").style.display = "none";
            alert(`✅ Sincronização concluída! ${sucessoCont} faturas salvas e enviadas para a fila do robô.`);
            carregarListaColeta(); // Recarrega para limpar as taxas
        };
    </script>
</body>
</html>
