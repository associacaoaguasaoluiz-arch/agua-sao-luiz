<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta - Água São Luiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 5px solid #e2e8f0; border-top: 5px solid #2563eb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .scroll-suave::-webkit-scrollbar { display: none; }
        
        /* Melhorias para digitação no Sol */
        input::placeholder { color: #94a3b8; opacity: 1; }
        .card-preenchido { border-color: #3b82f6 !important; background-color: #eff6ff !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2) !important; }
        .btn-gigante { min-height: 56px; } /* Área de toque maior para dedos */
    </style>
</head>
<body class="text-slate-900 h-screen flex flex-col overflow-hidden">

    <div id="loading" class="loading-overlay"><div class="spinner"></div><p id="loadingMsg" class="mt-4 font-black text-slate-800 text-lg tracking-tight">A processar...</p></div>

    <div id="loginAgente" class="fixed inset-0 bg-slate-900 flex justify-center items-center z-50 p-4">
        <form onsubmit="window.entrarAgente(event)" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-b-8 border-blue-600">
            <div class="bg-blue-100 w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner"><i class="fa-solid fa-droplet text-5xl text-blue-600"></i></div>
            <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Leiturista</h2>
            <p class="text-sm text-slate-500 mb-8 font-bold">Modo Terreno de Alta Visibilidade</p>
            <input type="password" id="senhaAgente" required placeholder="Senha de Acesso..." class="w-full p-5 border-2 border-slate-300 rounded-2xl mb-6 text-center text-2xl font-black outline-none focus:border-blue-600 focus:bg-blue-50 transition placeholder:text-base">
            <button type="submit" class="btn-gigante w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition text-xl uppercase tracking-wider">Acessar</button>
        </form>
    </div>

    <div id="modalSenha" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 text-center shadow-2xl border-2 border-slate-200">
            <h3 class="font-black text-2xl mb-2 text-slate-900">Alterar Senha</h3>
            <p class="text-sm text-slate-500 mb-6 font-bold">Escolha uma nova senha.</p>
            <input type="password" id="novaSenhaInput" placeholder="Nova senha..." class="w-full p-4 border-2 border-slate-300 rounded-2xl mb-6 text-center outline-none focus:border-blue-600 text-2xl font-black focus:bg-blue-50">
            <div class="flex gap-3">
                <button onclick="document.getElementById('modalSenha').style.display='none'" class="btn-gigante flex-1 bg-slate-200 text-slate-800 rounded-2xl font-black text-lg">Cancelar</button>
                <button onclick="window.salvarNovaSenha()" class="btn-gigante flex-[1.5] bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg">Atualizar</button>
            </div>
        </div>
    </div>

    <div id="modalAvulsoAgente" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex justify-center items-end sm:items-center p-0 sm:p-4">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-slide-up border-t-8 border-orange-500">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-2xl text-slate-900 tracking-tight"><i class="fa-solid fa-wrench text-orange-500 mr-2"></i>Serviço Extra</h3>
                <button onclick="document.getElementById('modalAvulsoAgente').classList.add('hidden')" class="text-slate-400 hover:text-red-600 text-4xl leading-none bg-slate-100 w-10 h-10 rounded-full flex items-center justify-center pb-1">&times;</button>
            </div>
            
            <input type="hidden" id="avulsoAgenteId">
            
            <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase tracking-widest">Qual o Serviço?</label>
            <input type="text" id="avulsoAgenteDesc" placeholder="Ex: Multa, Conserto..." class="btn-gigante w-full p-4 border-2 border-slate-300 rounded-2xl mb-3 outline-none focus:border-blue-600 text-lg font-black text-slate-900 focus:bg-blue-50 transition">
            
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scroll-suave">
                <button onclick="document.getElementById('avulsoAgenteDesc').value='Multa por Atraso'; document.getElementById('avulsoAgenteValor').value=(window.cfgGlobais.multa || 25).toFixed(2).replace('.', ',');" class="whitespace-nowrap bg-red-100 text-red-700 border-2 border-red-200 px-4 py-2 rounded-xl text-sm font-black active:scale-95 shadow-sm">🚨 Aplicar Multa</button>
                <button onclick="document.getElementById('avulsoAgenteDesc').value='Taxa de Religação';" class="whitespace-nowrap bg-blue-100 text-blue-700 border-2 border-blue-200 px-4 py-2 rounded-xl text-sm font-black active:scale-95 shadow-sm">💧 Religação</button>
            </div>

            <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase tracking-widest">Valor a Cobrar (R$)</label>
            <input type="text" inputmode="numeric" id="avulsoAgenteValor" placeholder="0,00" oninput="window.mascaraMoeda(event)" class="w-full p-4 border-2 border-slate-300 rounded-2xl mb-8 outline-none focus:border-blue-600 text-4xl font-black text-blue-700 text-center focus:bg-blue-50 transition tracking-tighter" style="height: 70px;">
            
            <div class="flex gap-3">
                <button onclick="window.limparAvulsoAgente()" class="btn-gigante flex-1 bg-red-100 text-red-600 rounded-2xl font-black text-lg border-2 border-red-200">Zerar</button>
                <button onclick="window.salvarAvulsoAgente()" class="btn-gigante flex-[1.5] bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="painelAgente" class="flex flex-col w-full h-full hidden">
        <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg z-40 border-b-4 border-blue-600">
            <div>
                <h1 class="font-black text-xl tracking-tight leading-none mb-1">São Luiz <span class="text-blue-400">Coleta</span></h1>
                <div id="statusConexao" class="flex items-center gap-1.5 text-emerald-400 text-xs font-bold uppercase tracking-wider">
                    <span class="relative flex h-2.5 w-2.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span></span> Online
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('modalSenha').style.display='flex'" class="text-slate-300 hover:text-white p-3 bg-slate-800 rounded-xl transition text-lg"><i class="fa-solid fa-key"></i></button>
                <button onclick="window.sairAgente()" class="text-red-400 hover:text-red-300 p-3 bg-slate-800 rounded-xl transition text-lg"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-3 md:p-4 pb-28 relative bg-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-slate-800 text-xl tracking-tight"><i class="fa-solid fa-list-ol text-blue-600 mr-2"></i>Leituras</h2>
                <span id="contadorLeituras" class="bg-blue-600 text-white font-black px-4 py-1.5 rounded-xl text-sm shadow-md">0 / 0</span>
            </div>

            <input type="text" id="buscaMorador" onkeyup="window.filtrarCards()" placeholder="🔍 Nome ou morada..." class="btn-gigante w-full p-4 bg-white shadow-md border-2 border-slate-300 rounded-2xl mb-5 outline-none focus:border-blue-600 text-lg font-black text-slate-800 placeholder:text-slate-400 focus:ring-4 focus:ring-blue-100 transition">

            <div id="avisoRascunho" class="hidden bg-amber-100 border-l-4 border-amber-500 text-amber-800 p-4 rounded-r-2xl mb-5 text-sm font-black shadow-sm flex items-center gap-3">
                <i class="fa-solid fa-floppy-disk text-2xl text-amber-500"></i> Rascunhos da última sessão restaurados.
            </div>

            <div id="listaCards" class="space-y-5">
                <p class="text-center text-slate-500 font-bold text-lg mt-10"><i class="fa-solid fa-cloud-arrow-down mb-2 text-3xl"></i><br>A carregar dados...</p>
            </div>
        </main>
        
        <div class="fixed bottom-0 left-0 w-full bg-white border-t-2 border-slate-200 p-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40">
            <button onclick="window.sincronizarEGerarLote()" id="btnSincronizar" class="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-[0_4px_0_0_#047857] active:shadow-none active:translate-y-1 transition-all flex justify-center items-center gap-3 text-xl tracking-tight">
                <i class="fa-solid fa-cloud-arrow-up text-2xl"></i> SINCRONIZAR
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, enableIndexedDbPersistence, addDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCGXtcoSinCR6Kn7nDNf4ITWCelYW1PKBQ", authDomain: "sistema-agua-sao-luiz.firebaseapp.com", projectId: "sistema-agua-sao-luiz" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ativação do Banco Offline
        enableIndexedDbPersistence(db).catch((err) => { console.log("Offline não suportado."); });

        window.moradoresGlobal = [];
        window.cfgGlobais = { val1: 25, val2: 50, val3: 100, multa: 25 };

        window.addEventListener('beforeunload', function (e) {
            const rascunhos = JSON.parse(localStorage.getItem('rascunhos_coleta') || '{}');
            if (Object.keys(rascunhos).length > 0) { e.preventDefault(); e.returnValue = ''; }
        });

        // Rede e Sincronização
        const atualizarStatusRede = () => {
            const el = document.getElementById("statusConexao");
            const btnSync = document.getElementById("btnSincronizar");
            if (navigator.onLine) {
                el.innerHTML = '<span class="relative flex h-3 w-3 mr-1.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span> ONLINE';
                el.className = "flex items-center text-emerald-500 text-[11px] font-black mt-0.5 tracking-widest";
                btnSync.classList.remove("opacity-50", "pointer-events-none", "bg-slate-400", "shadow-[0_4px_0_0_#475569]");
                btnSync.classList.add("bg-emerald-500", "shadow-[0_4px_0_0_#047857]");
                btnSync.innerHTML = '<i class="fa-solid fa-cloud-arrow-up text-2xl"></i> SINCRONIZAR';
            } else {
                el.innerHTML = '<i class="fa-solid fa-plane-slash mr-1 text-sm"></i> OFFLINE';
                el.className = "flex items-center text-red-500 text-[11px] font-black mt-0.5 tracking-widest bg-red-100 px-2 py-0.5 rounded border border-red-200";
                btnSync.classList.add("opacity-50", "pointer-events-none", "bg-slate-400", "shadow-[0_4px_0_0_#475569]");
                btnSync.classList.remove("bg-emerald-500", "shadow-[0_4px_0_0_#047857]");
                btnSync.innerHTML = '<i class="fa-solid fa-wifi text-2xl"></i> REQUER INTERNET';
            }
        };
        window.addEventListener('online', atualizarStatusRede);
        window.addEventListener('offline', atualizarStatusRede);
        atualizarStatusRede();

        // Máscara de Dinheiro Inteligente
        window.mascaraMoeda = (event) => {
            let v = event.target.value.replace(/\D/g, '');
            if(v === '') { event.target.value = ''; return; }
            v = (parseInt(v, 10) / 100).toFixed(2);
            event.target.value = v.replace('.', ',');
        };

        // Função de Saltar Input (Enter ou Botão Ir)
        window.pularParaProximo = (event, currentId) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                const inputs = Array.from(document.querySelectorAll('input[id^="atu-"]'));
                // Filtra apenas os inputs visíveis (se tiver buscado algo)
                const inputsVisiveis = inputs.filter(i => i.closest('.card-morador').style.display !== 'none');
                
                const currentIndex = inputsVisiveis.findIndex(el => el.id === `atu-${currentId}`);
                if (currentIndex >= 0 && currentIndex < inputsVisiveis.length - 1) {
                    inputsVisiveis[currentIndex + 1].focus();
                    inputsVisiveis[currentIndex + 1].select();
                    // Scroll suave para alinhar o input na tela
                    inputsVisiveis[currentIndex + 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (currentIndex === inputsVisiveis.length - 1) {
                    inputsVisiveis[currentIndex].blur(); // Acabou a lista
                }
            }
        };

        window.carregarConfiguracoes = async () => {
            try {
                const snap = await getDoc(doc(db, "config", "valores"));
                if(snap.exists()) {
                    window.cfgGlobais = snap.data();
                    localStorage.setItem("cfg_cache", JSON.stringify(window.cfgGlobais));
                }
            } catch(e) {
                const c = localStorage.getItem("cfg_cache");
                if(c) window.cfgGlobais = JSON.parse(c);
            }
        };

        window.entrarAgente = async (e) => {
            e.preventDefault();
            const senhaInput = document.getElementById("senhaAgente").value;
            document.getElementById("loading").style.display = "flex";

            try {
                if (navigator.onLine) {
                    const docRef = doc(db, "config", "agente");
                    const snapInfo = await getDoc(docRef);
                    let senhaOficial = "agente123";
                    if(snapInfo.exists()) { senhaOficial = snapInfo.data().senha; } 
                    else { await setDoc(docRef, {senha: "agente123"}); }

                    if(senhaInput === senhaOficial) {
                        localStorage.setItem("agente_senha_cache", senhaOficial);
                        localStorage.setItem("agente_logado", "sim");
                        document.getElementById("loginAgente").style.display = "none";
                        document.getElementById("painelAgente").classList.remove('hidden');
                        await window.carregarConfiguracoes();
                        window.carregarListaColeta();
                    } else { alert("Senha incorreta!"); }
                } else {
                    const senhaCache = localStorage.getItem("agente_senha_cache") || "agente123";
                    if(senhaInput === senhaCache) {
                        localStorage.setItem("agente_logado", "sim");
                        document.getElementById("loginAgente").style.display = "none";
                        document.getElementById("painelAgente").classList.remove('hidden');
                        await window.carregarConfiguracoes();
                        window.carregarListaColeta();
                    } else { alert("Senha incorreta (Modo Offline)!"); }
                }
            } catch(err) { alert("Erro ao validar acesso."); }
            document.getElementById("loading").style.display = "none";
        };

        window.salvarNovaSenha = async () => {
            if(!navigator.onLine) return alert("Precisa de internet para alterar a senha.");
            const nova = document.getElementById("novaSenhaInput").value;
            if(nova.length < 4) return alert("A senha deve ter no mínimo 4 caracteres.");
            
            document.getElementById("loading").style.display = "flex";
            await setDoc(doc(db, "config", "agente"), { senha: nova });
            localStorage.setItem("agente_senha_cache", nova);
            document.getElementById("loading").style.display = "none";
            document.getElementById('modalSenha').style.display = 'none';
            document.getElementById("novaSenhaInput").value = "";
            alert("✅ Senha atualizada com sucesso!");
        };

        window.sairAgente = () => { localStorage.removeItem("agente_logado"); location.reload(); };

        window.onload = async () => {
            if(localStorage.getItem("agente_logado") === "sim") {
                document.getElementById("loginAgente").style.display = "none";
                document.getElementById("painelAgente").classList.remove('hidden');
                await window.carregarConfiguracoes();
                window.carregarListaColeta();
            }
        };

        // LIXEIRA INDIVIDUAL (NOVIDADE)
        window.limparLeitura = (id) => {
            if(confirm("🚨 Atenção: Deseja apagar a leitura e taxas inseridas para este morador?")) {
                document.getElementById(`atu-${id}`).value = "";
                document.getElementById(`avulso-val-${id}`).value = 0;
                document.getElementById(`avulso-desc-${id}`).value = "";
                window.calcularTotalCard(id);
            }
        };

        // AVULSO AGENTE
        window.abrirModalAvulso = (id) => {
            document.getElementById('avulsoAgenteId').value = id;
            document.getElementById('avulsoAgenteDesc').value = document.getElementById(`avulso-desc-${id}`).value || "";
            const val = parseFloat(document.getElementById(`avulso-val-${id}`).value);
            // Insere valor já com formatação da máscara se existir
            document.getElementById('avulsoAgenteValor').value = val > 0 ? val.toFixed(2).replace('.', ',') : "";
            
            document.getElementById('modalAvulsoAgente').classList.remove('hidden');
        };

        window.salvarAvulsoAgente = () => {
            const id = document.getElementById('avulsoAgenteId').value;
            const desc = document.getElementById('avulsoAgenteDesc').value;
            // Pega o valor da máscara e converte de volta para Float numérico
            const valStr = document.getElementById('avulsoAgenteValor').value.replace(/\./g, '').replace(',', '.');
            const val = parseFloat(valStr) || 0;
            
            if(val > 0 && desc.trim() === "") {
                alert("Informe uma descrição (ex: Multa) para este valor.");
                return;
            }

            document.getElementById(`avulso-desc-${id}`).value = desc;
            document.getElementById(`avulso-val-${id}`).value = val;
            
            window.calcularTotalCard(id);
            document.getElementById('modalAvulsoAgente').classList.add('hidden');
        };

        window.limparAvulsoAgente = () => {
            const id = document.getElementById('avulsoAgenteId').value;
            document.getElementById(`avulso-desc-${id}`).value = "";
            document.getElementById(`avulso-val-${id}`).value = 0;
            
            window.calcularTotalCard(id);
            document.getElementById('modalAvulsoAgente').classList.add('hidden');
        };

        // CÁLCULO E ATUALIZAÇÃO DA TELA
        window.calcularTotalCard = (id) => {
            const ant = parseFloat(document.getElementById(`ant-${id}`).value) || 0;
            const atuStr = document.getElementById(`atu-${id}`).value;
            const atu = atuStr === "" ? ant : parseFloat(atuStr);
            
            const avulsoVal = parseFloat(document.getElementById(`avulso-val-${id}`).value) || 0;
            const taxaBanco = parseFloat(document.getElementById(`taxa-banco-${id}`).value) || 0;

            let consumo = (atu >= ant && atu > 0) ? atu - ant : 0;
            document.getElementById(`cons-${id}`).innerText = consumo + " m³";

            let vAgua = 0;
            if (consumo > 0) { 
                if (consumo <= 10) vAgua = parseFloat(window.cfgGlobais.val1); 
                else if (consumo <= 30) vAgua = parseFloat(window.cfgGlobais.val2); 
                else vAgua = parseFloat(window.cfgGlobais.val3); 
            }

            const total = vAgua + avulsoVal + taxaBanco;
            document.getElementById(`total-${id}`).innerText = "R$ " + total.toFixed(2).replace('.', ',');
            
            const cardEl = document.getElementById(`card-${id}`);
            cardEl.dataset.valoragua = vAgua;
            cardEl.dataset.valortotal = total;
            cardEl.dataset.consumo = consumo;

            // Muda cor do card para dar feedback visual Forte ao Agente
            if (atuStr !== "" || avulsoVal > 0) {
                cardEl.classList.add('card-preenchido');
                cardEl.classList.remove('border-slate-300', 'bg-white');
            } else {
                cardEl.classList.remove('card-preenchido');
                cardEl.classList.add('border-slate-300', 'bg-white');
            }

            // Atualiza Botão Avulso
            const btnAvulso = document.getElementById(`btn-avulso-${id}`);
            if(avulsoVal > 0) {
                btnAvulso.innerHTML = `<span class="truncate max-w-[90px]">${document.getElementById(`avulso-desc-${id}`).value}</span> <span>+ R$ ${avulsoVal.toFixed(2).replace('.',',')}</span>`;
                btnAvulso.className = "w-full bg-orange-500 text-white border-b-4 border-orange-700 p-3 text-center font-black rounded-xl outline-none text-sm transition shadow-md flex justify-between items-center active:translate-y-1 active:border-b-0 mt-1";
            } else {
                btnAvulso.innerHTML = `<i class="fa-solid fa-plus mr-1"></i> Taxa/Multa`;
                btnAvulso.className = "w-full bg-orange-50 text-orange-600 border-2 border-orange-200 hover:bg-orange-100 p-3 text-center font-black rounded-xl outline-none text-sm transition shadow-sm flex justify-center items-center mt-1";
            }

            // Auto-Save Offline
            let rascunhos = JSON.parse(localStorage.getItem('rascunhos_coleta') || '{}');
            if (atuStr !== "" || avulsoVal > 0) { 
                rascunhos[id] = { atu: atuStr, avulsoVal: avulsoVal, avulsoDesc: document.getElementById(`avulso-desc-${id}`).value }; 
            } else { 
                delete rascunhos[id]; 
            }
            localStorage.setItem('rascunhos_coleta', JSON.stringify(rascunhos));
            
            // Atualiza Contador do Topo
            const totalDigitadas = Object.keys(rascunhos).length;
            document.getElementById("contadorLeituras").innerText = `${totalDigitadas} / ${window.moradoresGlobal.length}`;
        };

        window.carregarListaColeta = async () => {
            document.getElementById("loading").style.display = "flex";
            try {
                const snap = await getDocs(collection(db, "familias"));
                window.moradoresGlobal = [];
                snap.forEach(d => window.moradoresGlobal.push({id: d.id, ...d.data()}));
                window.moradoresGlobal.sort((a,b) => (a.nome || "").localeCompare(b.nome || "", 'pt-BR'));
                window.renderizarCards(window.moradoresGlobal);
            } catch(e) {
                document.getElementById("listaCards").innerHTML = "<p class='text-red-600 text-center font-black text-xl p-6 bg-red-50 rounded-2xl border-2 border-red-200'>Erro ao carregar dados. <br><span class='text-sm font-bold'>Conecte à internet pelo menos uma vez para baixar a base de dados.</span></p>";
            }
            document.getElementById("loading").style.display = "none";
        };

        window.renderizarCards = (lista) => {
            let html = "";
            let rascunhos = JSON.parse(localStorage.getItem('rascunhos_coleta') || '{}');
            if(Object.keys(rascunhos).length > 0) document.getElementById("avisoRascunho").classList.remove("hidden");
            else document.getElementById("avisoRascunho").classList.add("hidden");

            lista.forEach(f => {
                const taxaBanco = f.taxa_pendente_valor || 0;
                const taxaBancoDesc = f.taxa_pendente_desc || "";
                
                const rascunho = rascunhos[f.id] || {};
                const atuVal = rascunho.atu !== undefined ? rascunho.atu : "";
                const avulsoVal = rascunho.avulsoVal || 0;
                const avulsoDesc = rascunho.avulsoDesc || "";

                html += `
                <div class="card-morador bg-white border-2 border-slate-300 p-5 rounded-3xl mb-5 transition-all" id="card-${f.id}" data-nome="${f.nome.toLowerCase()}" data-cpf="${f.cpf}" data-telefone="${f.telefone}" data-taxa="${taxaBanco}" data-desc="${taxaBancoDesc}">
                    
                    <div class="flex justify-between items-start border-b-2 border-slate-100 pb-4 mb-4">
                        <div class="pr-2">
                            <h3 class="font-black text-slate-900 text-xl leading-tight mb-1">${f.nome}</h3>
                            <p class="text-xs text-slate-500 font-bold"><i class="fa-solid fa-location-dot text-blue-500 mr-1"></i> ${f.lote_endereco || "Sem endereço"}</p>
                            ${taxaBanco > 0 ? `<span class="bg-amber-100 text-amber-800 border border-amber-200 text-[10px] font-black px-2.5 py-1 rounded-lg mt-2 inline-block shadow-sm">Agendado (Admin): R$ ${taxaBanco.toFixed(2).replace('.',',')}</span>` : ''}
                        </div>
                        <button onclick="window.limparLeitura('${f.id}')" class="bg-red-50 text-red-500 hover:bg-red-100 border-2 border-red-100 w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm shrink-0" title="Limpar Cartão">
                            <i class="fa-solid fa-trash-can text-xl"></i>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-5 gap-3 mb-4">
                        <div class="col-span-2 bg-slate-100 p-3 rounded-2xl text-center border-2 border-slate-200 flex flex-col justify-center">
                            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ant.</span>
                            <input type="number" id="ant-${f.id}" value="${f.ultima_leitura || 0}" readonly class="w-full bg-transparent text-center font-black text-slate-600 text-xl outline-none pointer-events-none">
                        </div>
                        <div class="col-span-3 bg-white p-2 rounded-2xl text-center border-4 border-slate-300 focus-within:border-blue-600 focus-within:bg-blue-50 transition shadow-inner">
                            <span class="block text-[11px] font-black text-blue-600 uppercase tracking-widest mb-1">Atual</span>
                            <input type="number" inputmode="numeric" id="atu-${f.id}" value="${atuVal}" 
                                oninput="window.calcularTotalCard('${f.id}')" 
                                onkeydown="window.pularParaProximo(event, '${f.id}')" 
                                placeholder="DIGITE" 
                                class="w-full bg-transparent text-center font-black text-slate-900 text-4xl outline-none placeholder:text-2xl placeholder:font-bold placeholder:text-slate-300" style="height: 48px;">
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-slate-50 p-3.5 rounded-2xl border-2 border-slate-200 mb-4">
                        <div class="flex-1 text-center border-r-2 border-slate-200 pr-2">
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">M³ Consumo</label>
                            <span id="cons-${f.id}" class="font-black text-blue-600 text-xl">0 m³</span>
                        </div>
                        <div class="flex-[1.5]">
                            <button onclick="window.abrirModalAvulso('${f.id}')" id="btn-avulso-${f.id}">
                                </button>
                            <input type="hidden" id="avulso-val-${f.id}" value="${avulsoVal}">
                            <input type="hidden" id="avulso-desc-${f.id}" value="${avulsoDesc}">
                            <input type="hidden" id="taxa-banco-${f.id}" value="${taxaBanco}">
                            <input type="hidden" id="taxa-banco-desc-${f.id}" value="${taxaBancoDesc}">
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-slate-900 text-white p-4 rounded-2xl shadow-md border-b-4 border-emerald-500">
                        <span class="text-xs font-black uppercase tracking-widest text-slate-300">A PAGAR</span>
                        <span id="total-${f.id}" class="font-black text-2xl text-emerald-400 tracking-tight">R$ 0,00</span>
                    </div>
                </div>
                `;
            });
            document.getElementById("listaCards").innerHTML = html;
            document.getElementById("contadorLeituras").innerText = `${Object.keys(rascunhos).length} / ${lista.length}`;
            lista.forEach(f => window.calcularTotalCard(f.id));
        };

        window.filtrarCards = () => {
            const termo = document.getElementById("buscaMorador").value.toLowerCase();
            document.querySelectorAll(".card-morador").forEach(c => {
                c.style.display = c.dataset.nome.includes(termo) ? "block" : "none";
            });
        };

        window.sincronizarEGerarLote = async () => {
            if(!navigator.onLine) return alert("❌ Conecte à internet para gerar o PIX e sincronizar com o Servidor Central.");

            const cards = document.querySelectorAll(".card-morador");
            let faturasParaGerar = [];

            cards.forEach(card => {
                const id = card.id.replace('card-', '');
                const atuVal = document.getElementById(`atu-${id}`).value;
                const total = parseFloat(card.dataset.valortotal) || 0;
                
                const avulsoVal = parseFloat(document.getElementById(`avulso-val-${id}`).value) || 0;
                const avulsoDesc = document.getElementById(`avulso-desc-${id}`).value || "";
                const taxaBanco = parseFloat(document.getElementById(`taxa-banco-${id}`).value) || 0;
                const taxaBancoDesc = document.getElementById(`taxa-banco-desc-${id}`).value || "";

                let taxaFinal = taxaBanco + avulsoVal;
                let descFinalTaxa = [];
                if(taxaBancoDesc) descFinalTaxa.push(taxaBancoDesc);
                if(avulsoDesc) descFinalTaxa.push(avulsoDesc);
                let descTaxaJunta = descFinalTaxa.join(" + ");
                
                if (atuVal !== "" || avulsoVal > 0 || total > 0) {
                    faturasParaGerar.push({
                        familia_id: id,
                        nome: document.querySelector(`#card-${id} h3`).innerText,
                        cpf: card.dataset.cpf.replace(/\D/g, ''),
                        telefone: card.dataset.telefone,
                        leitura_anterior: parseFloat(document.getElementById(`ant-${id}`).value) || 0,
                        leitura_atual: parseFloat(atuVal) || parseFloat(document.getElementById(`ant-${id}`).value),
                        consumo_m3: parseFloat(card.dataset.consumo),
                        valor_agua: parseFloat(card.dataset.valoragua),
                        valor_multa: 0, 
                        taxa_extra: taxaFinal,
                        desc_taxa: descTaxaJunta,
                        valor_total: total
                    });
                }
            });

            if (faturasParaGerar.length === 0) return alert("Nenhuma leitura nova preenchida para sincronizar.");
            if(!confirm(`Gerar e Sincronizar ${faturasParaGerar.length} faturas para o Robô enviar?`)) return;

            document.getElementById("loadingMsg").innerText = `A Sincronizar ${faturasParaGerar.length} faturas...`;
            document.getElementById("loading").style.display = "flex";

            const dataAtual = new Date();
            const mesStr = `${String(dataAtual.getMonth() + 1).padStart(2, '0')}/${dataAtual.getFullYear()}`;
            const vencimentoStr = `${dataAtual.getFullYear()}-${String(dataAtual.getMonth() + 1).padStart(2, '0')}-20`;

            let sucessoCont = 0;

            for (let fat of faturasParaGerar) {
                let descFinal = `Água ${mesStr}`;
                if(fat.taxa_extra > 0) descFinal += ` + ${fat.desc_taxa}`;

                try {
                    const res = await fetch("/api/gerar-pix", { 
                        method: "POST", headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ valor: fat.valor_total, descricao: descFinal, nome: fat.nome, cpf: fat.cpf }) 
                    });
                    const pix = await res.json();

                    if(pix.sucesso) {
                        await addDoc(collection(db, "faturas"), { 
                            familia_id: fat.familia_id, 
                            mes_referencia: descFinal, 
                            leitura_anterior: fat.leitura_anterior, 
                            leitura_atual: fat.leitura_atual, 
                            consumo_m3: fat.consumo_m3, 
                            valor_agua: fat.valor_agua, 
                            valor_multa: fat.valor_multa, 
                            taxa_extra: fat.taxa_extra, 
                            valor_total: fat.valor_total, 
                            vencimento: vencimentoStr, 
                            status: "pendente", 
                            whatsapp_enviado: false, 
                            pix_copia_cola: pix.copiaECola, 
                            qr_code_base64: pix.qrCodeBase64, 
                            pix_txid: String(pix.txid), 
                            data_lancamento: new Date().toISOString(), 
                            telefone: fat.telefone, 
                            nome_morador: fat.nome 
                        });
                        
                        await updateDoc(doc(db, "familias", fat.familia_id), { 
                            ultima_leitura: fat.leitura_atual, 
                            taxa_pendente_valor: 0, 
                            taxa_pendente_desc: "" 
                        });
                        
                        // LOG DETALHADO DO AGENTE
                        await addDoc(collection(db, "logs_agente"), {
                            data: new Date().toISOString(),
                            acao: 'Gerada (Rua)',
                            cliente: fat.nome,
                            valor: fat.valor_total
                        });

                        sucessoCont++;
                    }
                } catch(e) { console.error(`Falha no PIX de ${fat.nome}`, e); }
            }

            document.getElementById("loading").style.display = "none";
            localStorage.removeItem('rascunhos_coleta'); 
            alert(`✅ Sucesso Absoluto!\n${sucessoCont} faturas enviadas para o Robô.`);
            window.carregarListaColeta();
        };
    </script>
</body>
</html>
